apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: open5gs-upf2-pps
  namespace: open5gs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: open5gs-upf2
  minReplicas: 1
  maxReplicas: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max
  metrics:
    - type: External
      external:
        metric:
          name: upf_n3_in_pps
        target:
          type: Value
          value: "4000"
